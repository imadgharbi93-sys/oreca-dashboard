<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Oreca Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F1F5F9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #0F172A;
      letter-spacing: -.04em;
    }
    .login-logo-sub {
      font-size: .72rem;
      font-weight: 600;
      color: #94A3B8;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-top: 4px;
    }

    .login-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
      padding: 32px 28px;
    }

    .login-card-title {
      font-size: 15px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 22px;
    }

    .login-field { margin-bottom: 16px; }
    .login-label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: #64748B;
      margin-bottom: 6px;
      letter-spacing: .02em;
    }
    .login-input {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      font-size: 13.5px;
      font-family: inherit;
      color: #0F172A;
      background: #FAFAFA;
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .login-input:focus {
      border-color: #E11D48;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(225,29,72,.08);
    }

    .login-btn {
      width: 100%;
      padding: 11px;
      background: #E11D48;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s, transform .1s;
    }
    .login-btn:hover  { background: #be123c; }
    .login-btn:active { transform: scale(.98); }

    .login-error {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #FFF1F2;
      border: 1px solid #FECDD3;
      border-radius: 8px;
      padding: 10px 13px;
      margin-top: 14px;
      font-size: 12.5px;
      font-weight: 500;
      color: #9F1239;
    }
    .login-error-icon { font-size: 14px; flex-shrink: 0; }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #94A3B8;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-logo">
    <img src="{{ url_for('static', filename='img/oreca-logo.jpeg') }}"
         alt="Oreca Group"
         style="width:90px;opacity:.9;display:block;margin:0 auto 12px;">
    <div class="login-logo-title">Oreca Group</div>
    <div class="login-logo-sub">Dashboard CEO</div>
  </div>

  <div class="login-card">
    <div class="login-card-title">Connexion</div>

    <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div class="login-field">
        <label class="login-label" for="username">Identifiant</label>
        <input class="login-input" type="text" id="username" name="username"
               placeholder="Votre identifiant" autocomplete="username" autofocus>
      </div>
      <div class="login-field">
        <label class="login-label" for="password">Mot de passe</label>
        <input class="login-input" type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" type="submit">Se connecter</button>

      {% if error %}
      <div class="login-error">
        <span class="login-error-icon">⚠</span>
        {{ error }}
      </div>
      {% endif %}
    </form>
  </div>

  <div class="login-footer">Accès restreint · Oreca Group © 2026</div>
</div>

</body>
</html>
